<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodieDash - Premium Food Delivery</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', 'Poppins', sans-serif;
        transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
      }
      
      /* ============================================ */
      /* PREMIUM LIGHT MODE */
      /* ============================================ */
      body.light-mode {
        background: linear-gradient(135deg, #fdf8f0 0%, #fff5ed 25%, #ffffff 50%, #fef3e8 75%, #fdf8f0 100%);
        color: #1a1a2e;
      }
      
      body.light-mode .card-premium {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(249, 115, 22, 0.1);
        border-radius: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      body.light-mode .card-premium:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(249, 115, 22, 0.12);
        border-color: rgba(249, 115, 22, 0.3);
      }
      
      /* ============================================ */
      /* PREMIUM DARK MODE */
      /* ============================================ */
      body.dark-mode {
        background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 30%, #1a1a2e 70%, #0f0f1a 100%);
        color: #e2e8f0;
      }
      
      body.dark-mode .card-premium {
        background: rgba(30, 30, 46, 0.95);
        border: 1px solid rgba(249, 115, 22, 0.15);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      
      body.dark-mode .card-premium:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(249, 115, 22, 0.2);
        border-color: rgba(249, 115, 22, 0.4);
      }
      
      /* ============================================ */
      /* HERO SECTION - CLEAR IMAGE NO BLUR */
      /* ============================================ */
      .hero-section {
        position: relative;
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      .hero-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        image-rendering: crisp-edges;
        image-rendering: high-quality;
      }
      
      .hero-overlay-light {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(253, 248, 240, 0.6) 0%, rgba(255, 245, 237, 0.4) 50%, rgba(254, 243, 232, 0.6) 100%);
      }
      
      .hero-overlay-dark {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(10, 10, 10, 0.7) 0%, rgba(15, 15, 26, 0.5) 50%, rgba(10, 10, 10, 0.7) 100%);
      }
      
      .hero-content {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      
      /* ============================================ */
      /* ANIMATED INPUT FIELDS */
      /* ============================================ */
      .input-group {
        position: relative;
        margin-bottom: 1.5rem;
      }
      
      .input-group input,
      .input-group textarea {
        width: 100%;
        padding: 14px 16px;
        font-size: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: white;
        transition: all 0.3s ease;
        outline: none;
      }
      
      .input-group textarea {
        resize: vertical;
        min-height: 100px;
      }
      
      .input-group label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: white;
        padding: 0 6px;
        color: #94a3b8;
        font-size: 1rem;
        transition: all 0.3s ease;
        pointer-events: none;
      }
      
      .input-group textarea ~ label {
        top: 18px;
        transform: none;
      }
      
      .input-group input:focus,
      .input-group textarea:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
      }
      
      .input-group input:focus ~ label,
      .input-group input:not(:placeholder-shown) ~ label,
      .input-group textarea:focus ~ label,
      .input-group textarea:not(:placeholder-shown) ~ label {
        top: 0;
        font-size: 0.75rem;
        color: #f97316;
        transform: translateY(-50%);
      }
      
      body.dark-mode .input-group input,
      body.dark-mode .input-group textarea {
        background: #1e1e2e;
        border-color: #334155;
        color: #e2e8f0;
      }
      
      body.dark-mode .input-group label {
        background: #1e1e2e;
        color: #94a3b8;
      }
      
      body.dark-mode .input-group input:focus,
      body.dark-mode .input-group textarea:focus {
        border-color: #f97316;
      }
      
      /* ============================================ */
      /* ANIMATIONS */
      /* ============================================ */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes fadeInLeft {
        from { opacity: 0; transform: translateX(-40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes fadeInRight {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.02); }
      }
      
      @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      .animate-fadeInUp { animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
      .animate-fadeInLeft { animation: fadeInLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
      .animate-fadeInRight { animation: fadeInRight 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
      .animate-float { animation: float 3s ease-in-out infinite; }
      .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }
      .gradient-animate { background-size: 200% auto; animation: gradientFlow 3s ease infinite; }
      
      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      .delay-500 { animation-delay: 0.5s; }
      
      /* ============================================ */
      /* PREMIUM BUTTON - VISIBLE ORANGE */
      /* ============================================ */
      .btn-premium {
        background: linear-gradient(135deg, #f97316, #ef4444);
        border: none;
        border-radius: 50px;
        padding: 14px 36px;
        font-weight: 700;
        font-size: 1.1rem;
        color: white;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
        position: relative;
        overflow: hidden;
      }
      
      .btn-premium::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
      
      .btn-premium:hover::before {
        width: 300px;
        height: 300px;
      }
      
      .btn-premium:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(249, 115, 22, 0.5);
      }
      
      .btn-outline {
        background: transparent;
        border: 2px solid #f97316;
        border-radius: 50px;
        padding: 12px 34px;
        font-weight: 600;
        font-size: 1rem;
        color: #f97316;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      .btn-outline:hover {
        background: #f97316;
        color: white;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(249, 115, 22, 0.3);
      }
      
      body.dark-mode .btn-outline {
        color: #f97316;
        border-color: #f97316;
      }
      
      body.dark-mode .btn-outline:hover {
        background: #f97316;
        color: white;
      }
      
      /* ============================================ */
      /* GRADIENT TEXT */
      /* ============================================ */
      .gradient-text {
        background: linear-gradient(135deg, #f97316, #ef4444, #dc2626);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        background-size: 200% auto;
        animation: gradientFlow 3s ease infinite;
      }
      
      /* ============================================ */
      /* SEARCH BAR STYLES */
      /* ============================================ */
      .search-bar {
        width: 100%;
        padding: 14px 20px 14px 50px;
        font-size: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 50px;
        background: white;
        transition: all 0.3s ease;
        outline: none;
      }
      
      .search-bar:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
      }
      
      body.dark-mode .search-bar {
        background: #1e1e2e;
        border-color: #334155;
        color: #e2e8f0;
      }
      
      body.dark-mode .search-bar:focus {
        border-color: #f97316;
      }
      
      /* ============================================ */
      /* CUSTOM SCROLLBAR */
      /* ============================================ */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: linear-gradient(135deg, #fef3e8, #fff5ed); }
      body.dark-mode ::-webkit-scrollbar-track { background: #1e1e2e; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f97316, #ef4444); border-radius: 4px; }
      
      /* ============================================ */
      /* RESPONSIVE */
      /* ============================================ */
      @media (max-width: 768px) {
        .hero-content { padding: 1rem; }
        .btn-premium, .btn-outline { padding: 10px 24px; font-size: 0.9rem; }
      }
      
      /* Utility Classes */
      .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="light-mode">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
