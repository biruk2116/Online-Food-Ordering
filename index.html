<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodieDash - Premium Food Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
      }
      
      /* Light Mode (Default) */
      :root {
        --bg-primary: #f8fafc;
        --bg-secondary: #ffffff;
        --bg-card: #ffffff;
        --text-primary: #1e293b;
        --text-secondary: #475569;
        --border-color: #e2e8f0;
      }
      
      /* Dark Mode Variables */
      body.dark-mode {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-card: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --border-color: #334155;
      }
      
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: all 0.3s ease;
      }
      
      /* Hero Background Image */
      .hero-bg {
        background-image: url('/src/assets/images/Burger.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
      }
      
      .hero-bg::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
      }
      
      body.dark-mode .hero-bg::before {
        background: rgba(0, 0, 0, 0.7);
      }
      
      /* Background Colors */
      .bg-white { background-color: var(--bg-secondary) !important; }
      .bg-gray-50 { background-color: var(--bg-primary) !important; }
      .bg-gray-100 { background-color: var(--bg-secondary) !important; }
      
      /* Text Colors */
      .text-gray-800, .text-gray-900, .text-gray-700 { color: var(--text-primary) !important; }
      .text-gray-600, .text-gray-500 { color: var(--text-secondary) !important; }
      
      /* Border Colors */
      .border-gray-200, .border-gray-300 { border-color: var(--border-color) !important; }
      
      /* Input Fields */
      input, textarea, select {
        background-color: var(--bg-secondary) !important;
        border-color: var(--border-color) !important;
        color: var(--text-primary) !important;
      }
      
      input::placeholder, textarea::placeholder {
        color: var(--text-secondary) !important;
      }
      
      /* Cards */
      .shadow-lg, .shadow-xl, .shadow-2xl {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      
      body.dark-mode .shadow-lg,
      body.dark-mode .shadow-xl,
      body.dark-mode .shadow-2xl {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      }
      
      /* Gradient Text */
      .gradient-text {
        background: linear-gradient(135deg, #f97316, #ef4444);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      
      /* Button Styles */
      .btn-primary {
        background: linear-gradient(135deg, #f97316, #ef4444);
        transition: all 0.3s ease;
      }
      
      .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
      }
      
      /* Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(50px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-50px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .animate-fadeInUp { animation: fadeInUp 0.6s ease-out; }
      .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
      .animate-slideInRight { animation: slideInRight 0.6s ease-out; }
      .animate-slideInLeft { animation: slideInLeft 0.6s ease-out; }
      .animate-bounce { animation: bounce 1s infinite; }
      .animate-pulse { animation: pulse 2s infinite; }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: var(--border-color); }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #f97316, #ef4444);
        border-radius: 5px;
      }
      
      /* Smooth Scroll */
      html { scroll-behavior: smooth; }
      
      /* Image Preview */
      .image-preview {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
