<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodieDash - Premium Food Delivery</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', 'Poppins', 'Outfit', sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* ============================================ */
      /* LIGHT MODE - Clean White Background */
      /* ============================================ */
      body.light-mode {
        background: #ffffff !important;
        color: #1a1a2e;
      }
      
      body.light-mode .bg-white,
      body.light-mode .bg-gray-50,
      body.light-mode .bg-gray-100 {
        background: #ffffff !important;
      }
      
      /* Light Mode Text Colors - Clean & Readable */
      body.light-mode h1,
      body.light-mode h2,
      body.light-mode h3,
      body.light-mode h4,
      body.light-mode .font-bold,
      body.light-mode .font-semibold {
        color: #1a1a2e !important;
      }
      
      body.light-mode p,
      body.light-mode .text-gray-700,
      body.light-mode .text-gray-800 {
        color: #2d3561 !important;
      }
      
      body.light-mode .text-gray-600,
      body.light-mode .text-gray-500,
      body.light-mode .text-sm {
        color: #5a6e8a !important;
      }
      
      body.light-mode .text-gray-400 {
        color: #8a9bb0 !important;
      }
      
      /* Light Mode Card Borders & Shadows */
      body.light-mode .shadow-lg,
      body.light-mode .shadow-xl,
      body.light-mode .shadow-2xl {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02) !important;
      }
      
      body.light-mode .border-gray-200,
      body.light-mode .border-gray-300 {
        border-color: #eef2f6 !important;
      }
      
      /* ============================================ */
      /* DARK MODE */
      /* ============================================ */
      body.dark-mode {
        background: linear-gradient(135deg, #0f0c1f 0%, #1a1025 50%, #0d0a1a 100%);
        color: #f0e6d8;
      }
      
      body.dark-mode .bg-white,
      body.dark-mode .bg-gray-50,
      body.dark-mode .bg-gray-100,
      body.dark-mode .bg-gray-800 {
        background: rgba(30, 20, 40, 0.95) !important;
      }
      
      body.dark-mode .text-gray-800,
      body.dark-mode .text-gray-900,
      body.dark-mode h1, 
      body.dark-mode h2, 
      body.dark-mode h3 {
        color: #f0e6d8 !important;
      }
      
      body.dark-mode .text-gray-600,
      body.dark-mode p {
        color: #c4b5a5 !important;
      }
      
      /* ============================================ */
      /* SLIDESHOW ANIMATIONS */
      /* ============================================ */
      .slideshow-container {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      
      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      
      .slide.active {
        opacity: 1;
      }
      
      .slide-content {
        position: absolute;
        bottom: 20%;
        left: 0;
        right: 0;
        text-align: center;
        color: white;
        animation: slideUp 0.8s ease-out;
      }
      
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .slide-dots {
        position: absolute;
        bottom: 20px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 12px;
        z-index: 10;
      }
      
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      .dot.active {
        background: #f97316;
        width: 30px;
        border-radius: 5px;
      }
      
      .dot:hover {
        background: #f97316;
        transform: scale(1.2);
      }
      
      /* ============================================ */
      /* CARD STYLES */
      /* ============================================ */
      .card {
        transition: all 0.3s ease;
      }
      
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      
      /* ============================================ */
      /* ANIMATIONS */
      /* ============================================ */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      
      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      
      .animate-fadeInUp {
        animation: fadeInUp 0.6s ease-out;
      }
      
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out;
      }
      
      .animate-slideInLeft {
        animation: slideInLeft 0.5s ease-out;
      }
      
      .animate-slideInRight {
        animation: slideInRight 0.5s ease-out;
      }
      
      .animate-scaleIn {
        animation: scaleIn 0.4s ease-out;
      }
      
      .animate-bounce {
        animation: bounce 1s infinite;
      }
      
      /* ============================================ */
      /* GRADIENT TEXT */
      /* ============================================ */
      .gradient-text {
        background: linear-gradient(135deg, #f97316, #ef4444);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      
      /* ============================================ */
      /* BUTTON STYLES */
      /* ============================================ */
      .btn-primary {
        background: linear-gradient(135deg, #f97316, #ef4444);
        transition: all 0.3s ease;
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
      }
      
      /* ============================================ */
      /* CUSTOM SCROLLBAR */
      /* ============================================ */
      ::-webkit-scrollbar {
        width: 6px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      
      body.dark-mode ::-webkit-scrollbar-track {
        background: #2a1a30;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #f97316, #ef4444);
        border-radius: 3px;
      }
      
      /* ============================================ */
      /* SMOOTH SCROLL */
      /* ============================================ */
      html {
        scroll-behavior: smooth;
      }
      
      /* ============================================ */
      /* UTILITY CLASSES */
      /* ============================================ */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      
      /* ============================================ */
      /* RESPONSIVE FONTS */
      /* ============================================ */
      @media (max-width: 768px) {
        body {
          font-size: 14px;
        }
        
        h1 {
          font-size: 32px !important;
        }
        
        h2 {
          font-size: 24px !important;
        }
      }
    </style>
  </head>
  <body class="light-mode">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
